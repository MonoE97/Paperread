interface:
  display_name: "paper_reader_batch"
  short_description: "Paper Reader Batch 2.2 journaled orchestration"
  default_prompt: "Use $paper_reader_batch through the Paper Reader Batch 2.2 released grouped CLI runtime. Route PDF folder and path items to local-only $paper_reader work. For Zotero items, delegate the current secondary-plan policy, immutable Extra-link capture, secondary cross-check work, and finding-anchor assessment to $paper_reader without fetching or interpreting pages in batch. Require the single-paper Chinese-first sealed-review gate, mutate the batch only through request-id-bound journal events and claim or lease identities, preview the candidate before explicit real-write intent, create a claim-bound authorization, pass it through batch write begin so write.started is durable, and only then let the external agent send the returned MCP write_note envelope at most once before verification or reconciliation. Reject V1 and unversioned artifacts as historical-only; do not migrate or fall back."
policy:
  allow_implicit_invocation: true
